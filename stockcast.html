<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockCast">
<title>StockCast — 美股语音播报</title>
<script>
const S={user:null,plan:"free",lang:"zh",apiKey:"",connected:false,bcOn:false,bcIntv:5,bcTimer:null,selPlanV:"pro",voices:[],selVoice:null,alerts:[],stocks:[
  {sym:"AAPL",name:"Apple Inc.",   cl:"#1e2e4a",tc:"#7cb3f5",p:213.45,c:1.23, pct:0.58},
  {sym:"TSLA",name:"Tesla Inc.",   cl:"#2a1a3a",tc:"#c084fc",p:178.92,c:-3.41,pct:-1.87},
  {sym:"NVDA",name:"NVIDIA Corp.", cl:"#1a3a1a",tc:"#4ade80",p:1089.3,c:22.1, pct:2.07},
  {sym:"MSFT",name:"Microsoft",    cl:"#1a2240",tc:"#60a5fa",p:432.18,c:-1.05,pct:-0.24},
  {sym:"AMZN",name:"Amazon.com",   cl:"#3a2a0a",tc:"#fbbf24",p:185.67,c:3.28, pct:1.80},
  {sym:"META",name:"Meta Platforms",cl:"#1a2040",tc:"#818cf8",p:521.34,c:8.91, pct:1.74},
]};

const I={
  zh:{watch:"自选股",stock:"股票",price:"价格",chg:"涨跌",addStock:"添加股票",bcTitle:"语音播报",bcMain:"自动播报",stopped:"已停止",intv:"播报间隔",testBc:"🔊 测试播报",voice:"语音选择",alTitle:"价格提醒",noAl:"暂无提醒",addAl:"＋ 添加提醒",hrsTitle:"交易时段",modalTitle:"添加股票",nW:"自选",nB:"播报",nA:"提醒",nH:"时段",open:"开盘中",pre:"盘前",after:"盘后",closed:"已收盘",weekend:"周末休市",
    bcText:(g,l)=>{let t="美股行情播报：";g.forEach(s=>{t+=s.sym+"，当前"+s.p.toFixed(2)+"美元，上涨"+s.pct.toFixed(2)+"个百分点；";});l.forEach(s=>{t+=s.sym+"，当前"+s.p.toFixed(2)+"美元，下跌"+Math.abs(s.pct).toFixed(2)+"个百分点；";});return t;},
    alText:(s,a)=>"提醒："+s.sym+" 已"+(a.cond==="above"?"上涨至":"下跌至")+" $"+s.p.toFixed(2)+"，触发 $"+a.price.toFixed(2)+" 价位"},
  en:{watch:"Watchlist",stock:"Stock",price:"Price",chg:"Change",addStock:"Add Stock",bcTitle:"Voice Cast",bcMain:"Auto Broadcast",stopped:"Stopped",intv:"Interval",testBc:"🔊 Test",voice:"Voice",alTitle:"Alerts",noAl:"No alerts",addAl:"＋ Add Alert",hrsTitle:"Market Hours",modalTitle:"Add Stock",nW:"Watch",nB:"Cast",nA:"Alerts",nH:"Hours",open:"Open",pre:"Pre-mkt",after:"After-hrs",closed:"Closed",weekend:"Weekend",
    bcText:(g,l)=>{let t="Market update: ";g.forEach(s=>{t+=s.sym+" $"+s.p.toFixed(2)+" +"+s.pct.toFixed(2)+"%. ";});l.forEach(s=>{t+=s.sym+" $"+s.p.toFixed(2)+" "+s.pct.toFixed(2)+"%. ";});return t;},
    alText:(s,a)=>"Alert: "+s.sym+" hit $"+s.p.toFixed(2)+", triggered $"+a.price.toFixed(2)+" "+a.cond}
};
const T=()=>I[S.lang];

// ── 视图切换 ──
function showV(id){
  ["splash","auth","paywall","app"].forEach(v=>{
    const el=document.getElementById(v);
    if(el) el.style.display=(v===id)?"flex":"none";
  });
}

// ── AUTH ──
function switchTab(t){
  document.querySelectorAll(".auth-tab").forEach((b,i)=>b.classList.toggle("on",(i===0&&t==="login")||(i===1&&t==="register")));
  document.getElementById("loginF").style.display=t==="login"?"":"none";
  document.getElementById("regF").style.display=t==="register"?"":"none";
}
function errMsg(m){const e=document.getElementById("authErr");e.textContent=m;e.style.display="block";setTimeout(()=>e.style.display="none",3000);}
function doLogin(){
  const em=document.getElementById("lEmail").value.trim(),pw=document.getElementById("lPwd").value;
  if(!em||!pw){errMsg("请填写邮箱和密码");return;}
  const u=JSON.parse(localStorage.getItem("sc_u")||"{}");
  if(!u[em]||u[em].pw!==btoa(pw)){errMsg("邮箱或密码错误");return;}
  login(em,u[em].plan||"free");
}
function doRegister(){
  const em=document.getElementById("rEmail").value.trim(),pw=document.getElementById("rPwd").value,pw2=document.getElementById("rPwd2").value;
  if(!em||!pw){errMsg("请填写完整信息");return;}
  if(pw!==pw2){errMsg("两次密码不一致");return;}
  if(pw.length<8){errMsg("密码至少8位");return;}
  const u=JSON.parse(localStorage.getItem("sc_u")||"{}");
  if(u[em]){errMsg("该邮箱已注册");return;}
  u[em]={pw:btoa(pw),plan:"free"};
  localStorage.setItem("sc_u",JSON.stringify(u));
  login(em,"free");
}
function demoLogin(){login("demo@stockcast.app","pro");}
function login(em,plan){
  S.user=em;S.plan=plan;
  localStorage.setItem("sc_s",JSON.stringify({em,plan,ts:Date.now()}));
  loadData();
  if(plan==="free"&&em!=="demo@stockcast.app") showV("paywall");
  else launchApp();
}
function doLogout(){
  S.user=null;S.plan="free";
  localStorage.removeItem("sc_s");
  if(S.bcTimer)clearInterval(S.bcTimer);
  S.bcOn=false;
  showV("auth");
}
function loadData(){
  const d=localStorage.getItem("sc_d_"+S.user);
  if(d){const o=JSON.parse(d);if(o.stocks)S.stocks=o.stocks;if(o.alerts)S.alerts=o.alerts;if(o.apiKey)S.apiKey=o.apiKey;if(o.lang)S.lang=o.lang;}
}
function save(){
  if(!S.user)return;
  localStorage.setItem("sc_d_"+S.user,JSON.stringify({stocks:S.stocks,alerts:S.alerts,apiKey:S.apiKey,lang:S.lang}));
}

// ── PAYWALL ──
function selPlan(p){
  S.selPlanV=p;
  document.querySelectorAll(".plan-card").forEach(c=>c.classList.remove("sel"));
  document.getElementById("p"+p.charAt(0).toUpperCase()+p.slice(1)).classList.add("sel");
  const pp=document.getElementById("pwPay"),pb=document.getElementById("payBtn");
  if(p==="free"){pp.style.display="none";pb.textContent="使用免费版";}
  else{pp.style.display="block";pb.textContent="开始7天免费试用";}
}
function fmtCard(el){let v=el.value.replace(/[^\d]/g,"").slice(0,16);el.value=v.replace(/(.{4})/g,"$1 ").trim();}
function doPay(){
  if(S.selPlanV==="free"){skipPay();return;}
  const btn=document.getElementById("payBtn");btn.textContent="处理中...";btn.disabled=true;
  setTimeout(()=>{
    const u=JSON.parse(localStorage.getItem("sc_u")||"{}");
    if(u[S.user]){u[S.user].plan=S.selPlanV;localStorage.setItem("sc_u",JSON.stringify(u));}
    S.plan=S.selPlanV;
    const ss=JSON.parse(localStorage.getItem("sc_s")||"{}");
    ss.plan=S.selPlanV;localStorage.setItem("sc_s",JSON.stringify(ss));
    launchApp();
  },1400);
}
function skipPay(){selPlan("free");doPay();}

// ── APP ──
function launchApp(){
  showV("app");applyLang();renderWatch();renderTicker();renderAlerts();
  loadVoices();checkMkt();setInterval(checkMkt,30000);startDrift();
  if(S.apiKey)reconnectFH();updateSettings();
}
function toggleLang(){S.lang=S.lang==="zh"?"en":"zh";document.getElementById("langBtn").textContent=S.lang==="zh"?"中":"EN";applyLang();save();}
function st(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
function applyLang(){
  const L=T();
  st("lblWatch",L.watch);st("lblStock",L.stock);st("lblPrice",L.price);st("lblChg",L.chg);st("lblAddStock",L.addStock);
  st("lblBcTitle",L.bcTitle);st("lblBcMain",L.bcMain);st("lblIntv",L.intv);st("testBtnEl",L.testBc);st("lblVoice",L.voice);
  st("lblAlTitle",L.alTitle);st("lblNoAl",L.noAl);st("lblAddAl",L.addAl);st("lblHrsTitle",L.hrsTitle);st("lblModalTitle",L.modalTitle);
  st("nLblW",L.nW);st("nLblB",L.nB);st("nLblA",L.nA);st("nLblH",L.nH);
  if(!S.bcOn)st("bcSub",L.stopped);
  document.getElementById("langBtn").textContent=S.lang==="zh"?"中":"EN";
}
function goPanel(name){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  document.getElementById("p"+name).classList.add("on");
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  const nb=document.getElementById({Watch:"nbWatch",Broadcast:"nbBroadcast",Alerts:"nbAlerts",Hours:"nbHours"}[name]);
  if(nb)nb.classList.add("on");
}

// ── WATCHLIST ──
function renderWatch(){
  const el=document.getElementById("watchRows");el.innerHTML="";
  S.stocks.forEach(s=>{
    const up=s.c>=0,hasAl=S.alerts.some(a=>a.sym===s.sym);
    const row=document.createElement("div");row.className="wl-row";
    row.innerHTML='<div class="s-ico" style="background:'+s.cl+';color:'+s.tc+'">'+s.sym.slice(0,2)+'</div>'
      +'<div><div class="s-sym">'+s.sym+'</div><div class="s-nm">'+s.name+'</div></div>'
      +'<div class="s-px">$'+s.p.toFixed(2)+'</div>'
      +'<div class="s-ch '+(up?"up":"dn")+'">'+(up?"+":"")+s.pct.toFixed(2)+'%</div>'
      +'<button class="bell-btn '+(hasAl?"on":"")+'" onclick="focusAlert(\''+s.sym+'\',event)">'
      +'<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></button>';
    el.appendChild(row);
  });
  const sel=document.getElementById("alSym");
  if(sel){const cur=sel.value;sel.innerHTML=S.stocks.map(s=>"<option"+(s.sym===cur?" selected":"")+">"+s.sym+"</option>").join("");}
}
function focusAlert(sym,e){
  if(e)e.stopPropagation();
  goPanel("Alerts");
  const s=document.getElementById("alSym");if(s)s.value=sym;
  document.getElementById("alPrice").focus();
}
function openModal(){document.getElementById("addOverlay").classList.add("on");document.getElementById("modalIn").value="";setTimeout(()=>document.getElementById("modalIn").focus(),100);}
function closeModal(){document.getElementById("addOverlay").classList.remove("on");}
function confirmAdd(){
  const sym=document.getElementById("modalIn").value.trim().toUpperCase();
  if(!sym)return;
  if(S.stocks.find(s=>s.sym===sym)){showToast(sym+" 已在自选股中");closeModal();return;}
  if(S.plan==="free"&&S.stocks.length>=3){showToast("免费版最多3只，请升级Pro");return;}
  const cl=["#1e2e4a","#2a1a3a","#1a3a1a","#3a2a0a","#1a2040","#2a1a2a"];
  const tc=["#7cb3f5","#c084fc","#4ade80","#fbbf24","#818cf8","#f9a8d4"];
  const i=S.stocks.length%6;
  S.stocks.push({sym,name:sym,cl:cl[i],tc:tc[i],p:100,c:0,pct:0});
  renderWatch();renderTicker();save();
  if(S.apiKey)fetchOne(sym,S.apiKey);
  showToast(sym+" 已添加");closeModal();
}

// ── TICKER ──
function renderTicker(){
  const el=document.getElementById("tickerTrack");
  const items=[...S.stocks,...S.stocks];
  el.innerHTML=items.map(s=>{
    const up=s.c>=0;
    return '<div class="ti"><span class="ti-sym">'+s.sym+'</span><span>$'+s.p.toFixed(2)+'</span>'
      +'<span class="ti-chg '+(up?"up":"dn")+'">'+(up?"▲":"▼")+Math.abs(s.pct).toFixed(2)+'%</span></div>';
  }).join("");
}

// ── MARKET STATUS ──
function getET(){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000-5*3600000);}
function checkMkt(){
  const et=getET();const h=et.getHours(),m=et.getMinutes(),day=et.getDay();
  const tot=h*60+m;const L=T();
  const etStr=et.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  st("etNow",etStr);
  let status,dc;
  if(day===0||day===6){status=L.weekend;dc="closed";}
  else if(tot>=570&&tot<960){status=L.open;dc="open";}
  else if(tot>=240&&tot<570){status=L.pre;dc="pre";}
  else if(tot>=960&&tot<1200){status=L.after;dc="pre";}
  else{status=L.closed;dc="closed";}
  const dot=document.getElementById("mktDot");if(dot)dot.className="md "+dc;
  st("mktTxt",status);
  st("hPreSt",tot>=240&&tot<570?L.open:L.closed);
  st("hRegSt",tot>=570&&tot<960?L.open:L.closed);
  st("hAftSt",tot>=960&&tot<1200?L.open:L.closed);
  st("hNowSt",etStr);
  const hPre=document.getElementById("hPreSt");if(hPre)hPre.className="hc-st "+(tot>=240&&tot<570?"open":"closed");
  const hReg=document.getElementById("hRegSt");if(hReg)hReg.className="hc-st "+(tot>=570&&tot<960?"open":"closed");
  const hAft=document.getElementById("hAftSt");if(hAft)hAft.className="hc-st "+(tot>=960&&tot<1200?"open":"closed");
}

// ── BROADCAST ──
function toggleBc(){
  S.bcOn=!S.bcOn;
  document.getElementById("bcSw").classList.toggle("on",S.bcOn);
  document.getElementById("waveform").classList.toggle("on",S.bcOn);
  if(S.bcOn){st("bcSub","每 "+S.bcIntv+" 分钟");doSpeak();S.bcTimer=setInterval(doSpeak,S.bcIntv*60000);}
  else{st("bcSub",T().stopped);if(S.bcTimer)clearInterval(S.bcTimer);S.bcTimer=null;}
}
function setIntv(m,btn){
  S.bcIntv=m;
  document.querySelectorAll(".intv-btn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  if(S.bcOn){st("bcSub","每 "+m+" 分钟");if(S.bcTimer)clearInterval(S.bcTimer);S.bcTimer=setInterval(doSpeak,m*60000);}
}
function testBc(){doSpeak();}
function doSpeak(){
  const g=S.stocks.filter(s=>s.c>0).sort((a,b)=>b.pct-a.pct).slice(0,2);
  const l=S.stocks.filter(s=>s.c<0).sort((a,b)=>a.pct-b.pct).slice(0,1);
  speak(T().bcText(g,l));
  const now=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  st("lastBc",now+" — "+(g.map(s=>s.sym+" +"+s.pct.toFixed(1)+"%").join("  ")||"无数据"));
}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(S.selVoice)u.voice=S.selVoice;
  u.lang=S.lang==="zh"?"zh-CN":"en-US";u.rate=1.1;
  const wf=document.getElementById("waveform");
  if(wf)wf.classList.add("on");
  u.onend=()=>{if(!S.bcOn&&wf)wf.classList.remove("on");};
  window.speechSynthesis.speak(u);
}

// ── VOICES ──
function loadVoices(){
  const load=()=>{
    S.voices=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith("zh")||v.lang.startsWith("en"));
    renderVoices();
  };
  if(window.speechSynthesis){load();window.speechSynthesis.onvoiceschanged=load;}
}
function renderVoices(){
  const el=document.getElementById("voiceGrid");if(!el)return;
  const show=S.voices.slice(0,6);
  if(!show.length){el.innerHTML='<div style="font-size:13px;color:var(--tx3)">无可用语音</div>';return;}
  el.innerHTML=show.map((v,i)=>'<div class="vc '+(i===0?"on":"")+'" onclick="selVoice('+i+',this)"><div class="vc-name">'+v.name.slice(0,18)+'</div><div class="vc-lang">'+v.lang+'</div></div>').join("");
  S.selVoice=show[0]||null;
}
function selVoice(i,el){document.querySelectorAll(".vc").forEach(c=>c.classList.remove("on"));el.classList.add("on");S.selVoice=S.voices[i]||null;}

// ── ALERTS ──
function addAlert(){
  const sym=document.getElementById("alSym").value;
  const cond=document.getElementById("alCond").value;
  const price=parseFloat(document.getElementById("alPrice").value);
  if(!price||price<=0){showToast("请输入有效价格");return;}
  S.alerts.push({sym,cond,price,id:Date.now()});
  document.getElementById("alPrice").value="";
  renderAlerts();save();showToast(sym+" $"+price.toFixed(2)+" 提醒已设置");badge();
}
function removeAlert(id){S.alerts=S.alerts.filter(a=>a.id!==id);renderAlerts();save();badge();}
function renderAlerts(){
  const el=document.getElementById("alList");if(!el)return;
  if(!S.alerts.length){
    el.innerHTML='<div style="padding:16px;font-size:14px;color:var(--tx3);text-align:center">'+T().noAl+'</div>';
    badge();return;
  }
  el.innerHTML=S.alerts.map(a=>
    '<div class="al-item"><div class="al-l">'
    +'<span class="al-sym">'+a.sym+'</span>'
    +'<span class="al-cd">'+(a.cond==="above"?"≥":"≤")+'</span>'
    +'<span class="al-px">$'+a.price.toFixed(2)+'</span>'
    +'</div><button class="al-del" onclick="removeAlert('+a.id+')">×</button></div>'
  ).join("");
  badge();
}
function badge(){
  const b=document.getElementById("alBadge");if(!b)return;
  if(S.alerts.length){b.textContent=S.alerts.length;b.style.display="flex";}
  else b.style.display="none";
}
function checkAlerts(){
  S.alerts.forEach(a=>{
    const s=S.stocks.find(x=>x.sym===a.sym);if(!s)return;
    if((a.cond==="above"&&s.p>=a.price)||(a.cond==="below"&&s.p<=a.price)){
      const msg=T().alText(s,a);speak(msg);
      const el=document.getElementById("alHit");
      if(el){el.textContent=msg;el.style.display="block";setTimeout(()=>el.style.display="none",6000);}
      if(Notification.permission==="granted")new Notification("StockCast",{body:msg});
      S.alerts=S.alerts.filter(x=>x.id!==a.id);
      renderAlerts();renderWatch();save();
    }
  });
}

// ── FINNHUB ──
function connectFH(){
  const k=document.getElementById("apiIn").value.trim();
  if(!k){showToast("请输入 API Key");return;}
  const btn=document.getElementById("apiBtn");btn.textContent="连接中...";
  fetch("https://finnhub.io/api/v1/quote?symbol=AAPL&token="+k)
    .then(r=>r.json()).then(d=>{
      if(d&&d.c){
        S.apiKey=k;S.connected=true;save();
        btn.textContent="已连接 ✓";
        const cd=document.getElementById("connDot");if(cd)cd.classList.add("live");
        st("connTxt","Finnhub — 实时数据");
        fetchAll(k);setInterval(()=>fetchAll(k),60000);
        showToast("已连接 Finnhub 实时数据 ✓");
      }else{btn.textContent="Key 无效";setTimeout(()=>btn.textContent="连接",2000);}
    }).catch(()=>{btn.textContent="连接失败";setTimeout(()=>btn.textContent="连接",2000);});
}
function reconnectFH(){const el=document.getElementById("apiIn");if(el)el.value=S.apiKey;fetchAll(S.apiKey);}
function fetchAll(k){S.stocks.forEach((s,i)=>setTimeout(()=>fetchOne(s.sym,k),i*350));}
function fetchOne(sym,k){
  fetch("https://finnhub.io/api/v1/quote?symbol="+sym+"&token="+k)
    .then(r=>r.json()).then(d=>{
      if(d&&d.c){const s=S.stocks.find(x=>x.sym===sym);if(s){s.p=d.c;s.c=d.c-d.pc;s.pct=((d.c-d.pc)/d.pc)*100;}renderWatch();renderTicker();}
    }).catch(()=>{});
}

// ── PRICE DRIFT ──
function startDrift(){
  setInterval(()=>{
    if(S.connected)return;
    S.stocks.forEach(s=>{const d=(Math.random()-.48)*.9;s.p=Math.max(1,s.p+d);s.c+=d;s.pct=(s.c/(s.p-s.c))*100;});
    renderWatch();renderTicker();checkAlerts();
  },3000);
}

// ── PUSH ──
function reqPush(){
  if(!("Notification" in window)){showToast("浏览器不支持通知");return;}
  Notification.requestPermission().then(p=>{
    const btn=document.getElementById("pushBtn");
    if(p==="granted"){btn.textContent="🔔 Push 通知已开启";btn.classList.add("ok");showToast("Push 通知已开启 ✓");}
    else showToast("未授权通知权限");
  });
}

// ── SETTINGS ──
function updateSettings(){
  if(!S.user)return;
  st("uEmail",S.user);
  const pl={free:"免费版",pro:"Pro 订阅",annual:"年付 Pro"};
  const pt={free:"FREE",pro:"PRO",annual:"ANNUAL"};
  const pc={free:"free",pro:"pro",annual:"annual"};
  st("uPlan",pl[S.plan]||"免费版");
  const tag=document.getElementById("pTag");
  if(tag){tag.textContent=pt[S.plan]||"FREE";tag.className="ptag "+(pc[S.plan]||"free");}
  const apiEl=document.getElementById("apiIn");if(S.apiKey&&apiEl)apiEl.value=S.apiKey;
  if(S.connected){
    const cd=document.getElementById("connDot");if(cd)cd.classList.add("live");
    st("connTxt","Finnhub — 实时数据");
    const ab=document.getElementById("apiBtn");if(ab)ab.textContent="已连接 ✓";
  }
  if(Notification.permission==="granted"){
    const pb=document.getElementById("pushBtn");
    if(pb){pb.textContent="🔔 Push 通知已开启";pb.classList.add("ok");}
  }
}

// ── TOAST ──
function showToast(msg){
  const el=document.getElementById("toast");if(!el)return;
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2400);
}

// ── BOOT（最后执行，所有函数已定义）──
function boot(){
  try{
    const ss=localStorage.getItem("sc_s");
    if(ss){
      const o=JSON.parse(ss);
      if(o&&o.em&&(Date.now()-o.ts)<7*86400000){
        S.user=o.em;S.plan=o.plan||"free";
        loadData();launchApp();return;
      }
    }
  }catch(e){console.log("boot err",e);}
  showV("auth");
}

window.addEventListener("load",()=>{
  // 动画结束后跳转（主路径）
  const fill=document.getElementById("spFill");
  if(fill){
    fill.addEventListener("animationend",()=>{
      setTimeout(boot,200);
    });
  }
  // 超时保底 2.5 秒（防止 animationend 不触发）
  setTimeout(boot,2500);
});
</script>
</body>
